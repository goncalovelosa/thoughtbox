name: Adversarial Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  # Phase 1: Deterministic validation (fast, no LLM)
  validate-pr-description:
    name: Validate PR Description
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate PR description
        run: pnpm validate:pr --branch "${{ github.head_ref }}"

  # Phase 2: Adversarial LLM review via Letta Code GitHub Action
  adversarial-review:
    name: Adversarial Review (Letta)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-pr-description
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build prompt
        id: prompt
        run: |
          BRANCH="${{ github.head_ref }}"
          SAFE="${BRANCH//\//-}"
          PR_FILE="prs/${SAFE}.json"
          echo "value=Adversarial review for branch '${BRANCH}'. PR description: ${PR_FILE}. Read .github/prompts/adversarial-review-prompt.md for your full instructions and follow them exactly." >> $GITHUB_OUTPUT
          echo "pr_file=${PR_FILE}" >> $GITHUB_OUTPUT

      - name: Run adversarial review
        uses: letta-ai/letta-code-action@v0
        with:
          letta_api_key: ${{ secrets.LETTA_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          agent_id: ${{ secrets.ADVERSARIAL_REVIEWER_AGENT_ID }}
          prompt: ${{ steps.prompt.outputs.value }}

      - name: Parse verdict and gate CI
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            // Find the most recent comment on this PR containing ADVERSARIAL_VERDICT
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const verdictComment = [...comments.data]
              .reverse()
              .find(c => c.body && c.body.includes('ADVERSARIAL_VERDICT:'));

            if (!verdictComment) {
              core.setFailed('Adversarial reviewer did not post a verdict. Check the Letta agent run.');
              return;
            }

            const match = verdictComment.body.match(/ADVERSARIAL_VERDICT:\s*(\{[^\n]+\})/);
            if (!match) {
              core.setFailed('ADVERSARIAL_VERDICT line found but could not be parsed as JSON.');
              return;
            }

            let verdict;
            try {
              verdict = JSON.parse(match[1]);
            } catch (e) {
              core.setFailed(`ADVERSARIAL_VERDICT JSON parse failed: ${e.message}`);
              return;
            }

            if (verdict.verdict === 'FAIL') {
              const violations = (verdict.violations || [])
                .map(v => `  - [${v.claim_id}] ${v.finding}`)
                .join('\n');
              core.setFailed(`Adversarial review FAILED:\n${violations}`);
            } else if (verdict.verdict === 'PASS') {
              console.log('Adversarial review PASSED.');
            } else {
              core.setFailed(`Unknown verdict value: ${verdict.verdict}`);
            }
