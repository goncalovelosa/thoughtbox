name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm run lint

  db-types-drift:
    name: DB types drift check
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sync types
        run: bash scripts/sync-db-types.sh

      - name: Fail if types are stale
        run: |
          if ! git diff --exit-code src/lib/supabase/database.types.ts; then
            echo ""
            echo "❌ database.types.ts is out of sync with the remote schema."
            echo "   Run 'npm run db:types' locally and commit the result."
            exit 1
          fi
